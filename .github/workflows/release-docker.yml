name: Release Docker

on:
  push:
    tags: [ v* ]

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  upload:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lidi-send,lidi-oneshot-send,lidi-receive,lidi-oneshot-receive,lidi-send-file,lidi-receive-file,lidi-send-udp,lidi-receive-udp
          archive: lidi-$tag
          token: ${{ secrets.GITHUB_TOKEN }}
  build-and-push-docker-image:
    name: Builds and pushes a tagged docker image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lidi_service:
          - send
          - receive
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: docker_meta
        with:
          images: docker.io/anssi/lidi-${{ matrix.lidi_service }}
          tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: ${{ matrix.lidi_service }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
      

