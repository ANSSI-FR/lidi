mtu = 9000
ports = [5001, 5002, 5003, 5004]
block = 220_000
repair = 1
max_clients = 2
heartbeat = 10

[send]
log = "INFO"
to = "localhost"
to_bind = "0.0.0.0:0"
mode = "mmsg"
prometheus_listen = "127.0.0.1:9001"
#log4rs_config = "lidi_log4rs.yml"

from = [ "tcp[flush=true]:127.0.0.1:4000" ]

[receive]
log = "INFO"
from = "localhost"
mode = "mmsg"
queue_size = 4096
reset_timeout = 2
abort_timeout = 60
prometheus_listen = "127.0.0.1:9002"
#log4rs_config = "lidi_log4rs.yml"

to = [ "tcp[flush=true]:127.0.0.1:6000" ]

